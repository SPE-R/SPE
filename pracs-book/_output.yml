bookdown::gitbook:
  css: style.css
  pandoc_args: ["--lua-filter=_solutions.lua"]
  config:
    toc:
      before: |
        <li><a href="./index.html">SPE-R practicals</a></li>
      after: |
        <li><a href="https://github.com/SPE-R/SPE" target="blank">Published with bookdown</a></li>
    edit: https://github.com/SPE-R/SPE/edit/master/pracs-book/%s
    download: ["pdf", "epub"]
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  pandoc_args: ["--lua-filter=_solutions.lua"]
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes
  papersize: a4
  geometry: margin=0cm
bookdown::epub_book:
  pandoc_args: ["--lua-filter=_solutions.lua"]
